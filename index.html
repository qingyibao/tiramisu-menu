<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tiramisu</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, "Helvetica Neue", sans-serif;
      background: #fdf6e3;
      text-align: center;
      color: #5a3a2a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }
    h1 {
      color: #c25a3e;
      font-size: 28px;
      padding: 20px 20px 0;
      margin: 0;
    }
    .hint {
      color: #888;
      font-size: 15px;
      padding: 10px 30px;
      line-height: 1.5;
    }
    .image-container {
      width: 100%;
      max-width: 500px;
      padding: 20px;
      box-sizing: border-box;
    }
    img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <h1>🍰 Tiramisu</h1>
  <p class="hint">Today's special</p>

  <div class="image-container">
    <img src="tiramisu.jpg" alt="A delicious tiramisu">
  </div>
</body>
</html>
